<h2>Talabalar Ro'yxati</h2>
<a href="{% url 'create' %}">➕ Yangi Talaba Qo'shish</a>
<hr>

<ul>
    {% for talaba in talabalar %}
        <li>
            <strong>{{ talaba.ism }} {{ talaba.familiya }}</strong> (Guruh: {{ talaba.guruh }}, Yosh: {{ talaba.yosh }}) - 
            <a href="{% url 'update' talaba.pk %}">✏️ Tahrirlash</a> | 
            <a href="{% url 'delete' talaba.pk %}" style="color: red;">🗑️ O'chirish</a>
        </li>
    {% empty %}
        <p>Hozircha talabalar yo'q.</p>
    {% endfor %}
</ul>
