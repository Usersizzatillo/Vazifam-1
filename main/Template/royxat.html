<!DOCTYPE html>
<html>
<head>
    <title>{{ sarlavha }}</title>
</head>
<body>

<h1>{{ sarlavha }}</h1>

<p>Jami maqolalar: {{ jami }}</p>

{% for m in maqolalar %}
    <h3>
        <a href="{% url 'detail' m.pk %}">
            {{ m.sarlavha }}
        </a>
    </h3>

    <p>Muallif: {{ m.muallif }}</p>
    <hr>
{% empty %}
    <p>Maqola topilmadi.</p>
{% endfor %}

</body>
</html>
